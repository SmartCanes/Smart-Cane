services:
  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: graphhopper
    ports:
      - "8989:8989"
    environment:
      - JAVA_OPTS=-Xmx2g
    volumes:
      - ./maps:/data
    restart: unless-stopped
    command: --config /data/config.yml
    depends_on:
      - graphhopper-import
  node-middleware:
    build: ./middleware
    container_name: node-middleware
    depends_on:
      - graphhopper
    environment:
      MQTT_URL: mqtt://cloud-mqtt-broker:1883
      MQTT_USERNAME: username
      MQTT_PASSWORD: password
      GRAPHHOPPER_URL: http://graphhopper:8989
    restart: unless-stopped
